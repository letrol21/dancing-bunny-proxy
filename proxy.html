<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>New Tab</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #202124;
            color: white;
        }

        #tabs {
            display: flex;
            background: #303134;
            padding: 5px;
            overflow-x: auto;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: #3c4043;
            margin-right: 5px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tab.active {
            background: #5f6368;
        }

        .tab img {
            width: 16px;
            height: 16px;
        }

        .tab .close {
            margin-left: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #toolbar {
            display: flex;
            gap: 5px;
            padding: 8px;
            background: #303134;
        }

        button {
            background: #5f6368;
            border: none;
            color: white;
            padding: 6px;
            cursor: pointer;
        }

        input {
            flex: 1;
            padding: 6px;
            background: #202124;
            color: white;
            border: none;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 90px);
            border: none;
            background: white;
        }
    </style>
</head>

<body>

    <div id="tabs"></div>

    <div id="toolbar">
        <button onclick="newTab()">＋</button>
        <button onclick="back()">⬅</button>
        <button onclick="forward()">➡</button>
        <button onclick="reload()">⟳</button>
        <input id="urlBar" placeholder="Search or enter URL">
        <button onclick="navigate()">Go</button>
    </div>

    <div id="view"></div>

    <script>
        let tabs = [];
        let currentTab = 0;

        function createTab() {
            const iframe = document.createElement("iframe");

            const tab = {
                title: "New Tab",
                icon: "",
                url: "",
                iframe: iframe,
                history: [],
                index: -1
            };

            iframe.onload = () => {
                const tab = tabs[currentTab];

                try {
                    const doc = iframe.contentDocument;

                    // Same-origin
                    if (doc.title) {
                        tab.title = doc.title;
                    }

                    tab.url = iframe.src;

                    const icon =
                        doc.querySelector("link[rel~='icon']")?.href ||
                        iframe.src + "/favicon.ico";

                    tab.icon = icon;

                } catch (e) {
                    try {
                        const url = new URL(iframe.src);
                        const domain = url.hostname.replace(/^www\./, "");

                        tab.title = domain;
                        tab.url = iframe.src;

                        tab.icon = "https://www.google.com/s2/favicons?domain=" + url.hostname;

                    } catch {
                        tab.title = "New Tab";
                    }
                }

                document.getElementById("urlBar").value = tab.url || "";

                renderTabs();
            };

            return tab;
        }

        function newTab() {
            tabs.push(createTab());
            currentTab = tabs.length - 1;
            render();
        }

        function closeTab(i) {
            tabs.splice(i, 1);

            if (currentTab >= tabs.length) {
                currentTab = tabs.length - 1;
            }

            if (tabs.length === 0) {
                newTab();
            }

            render();
        }

        function switchTab(i) {
            currentTab = i;

            const tab = tabs[currentTab];

            document.getElementById("urlBar").value = tab.url || "";

            render();
        }


        function renderTabs() {
            const tabsDiv = document.getElementById("tabs");
            tabsDiv.innerHTML = "";

            tabs.forEach((t, i) => {
                const el = document.createElement("div");
                el.className = "tab" + (i === currentTab ? " active" : "");

                const icon = document.createElement("img");
                icon.src = t.icon || "https://www.google.com/s2/favicons?domain=example.com";

                const title = document.createElement("span");
                title.innerText = t.title || "Tab";

                const close = document.createElement("span");
                close.className = "close";
                close.innerText = "×";
                close.onclick = (e) => {
                    e.stopPropagation();
                    closeTab(i);
                };

                el.onclick = () => switchTab(i);

                el.appendChild(icon);
                el.appendChild(title);
                el.appendChild(close);

                tabsDiv.appendChild(el);
            });
        }

        function renderView() {
            const view = document.getElementById("view");
            view.innerHTML = "";
            view.appendChild(tabs[currentTab].iframe);
        }

        function render() {
            renderTabs();
            renderView();
        }


        function formatInput(input) {
            if (input.startsWith("http")) return input;
            if (input.includes(".")) return "https://" + input;
            return "https://www.google.com/search?q=" + encodeURIComponent(input);
        }

        function navigate() {
            const input = document.getElementById("urlBar").value;
            const url = formatInput(input);

            const tab = tabs[currentTab];

            tab.iframe.src = url;
            tab.url = url;

            tab.history.push(url);
            tab.index = tab.history.length - 1;

            try {
                const domain = new URL(url).hostname.replace(/^www\./, "");
                tab.title = domain;
                tab.icon = "https://www.google.com/s2/favicons?domain=" + domain;
            } catch {
                tab.title = "New Tab";
            }

            renderTabs();
        }

        function back() {
            const tab = tabs[currentTab];
            if (tab.index > 0) {
                tab.index--;
                tab.iframe.src = tab.history[tab.index];
            }
        }

        function forward() {
            const tab = tabs[currentTab];
            if (tab.index < tab.history.length - 1) {
                tab.index++;
                tab.iframe.src = tab.history[tab.index];
            }
        }

        function reload() {
            const iframe = tabs[currentTab].iframe;
            iframe.src = iframe.src;
        }


        newTab();
    </script>

</body>

</html>

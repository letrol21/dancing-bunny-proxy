<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dancing Bunny Proxy</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .proxy-btn { padding: 15px 30px; font-size: 1.2rem; background: #00ff88; color: #121212; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .proxy-btn:hover { background: #00cc6e; }
        .status { margin-top: 10px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>Dancing Bunny</h1>
    <button class="proxy-btn" onclick="launchProxy()">Launch Stealth Tab</button>
    <div class="status" id="status">Ready</div>

    <script>
        function launchProxy() {
            const statusBox = document.getElementById('status');
            const targetUrl = prompt("Enter full URL (include https://):", "https://bing.com");

            if (!targetUrl) return;

            // This MUST match your Render URL exactly
            const proxyBase = "https://dancing-bunny-proxy.onrender.com/?query=";
            const fullUrl = proxyBase + encodeURIComponent(targetUrl);

            statusBox.innerText = "Opening new tab... Please wait up to 60s for server wake-up.";

            const newWin = window.open("about:blank", "_blank");

            if (newWin) {
                // We write a basic loading message into the new tab first
                newWin.document.write(`
                    <title>Loading...</title>
                    <body style="margin:0; background:#000; color:white; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">
                        <div style="text-align:center;">
                            <h2>Connecting to Proxy...</h2>
                            <p>If this stays blank for >1 minute, check your Render dashboard logs.</p>
                            <iframe src="${fullUrl}" style="position:fixed; top:0; left:0; width:100%; height:100%; border:none;"></iframe>
                        </div>
                    </body>
                `);
                newWin.document.close();
            } else {
                alert("Pop-up blocked! Look for the icon in your address bar.");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dancing Bunny Proxy</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #000; color: #0f8; margin: 0; }
        .btn { padding: 15px 35px; font-size: 1.2rem; background: #0f8; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; color: #888; }
    </style>
</head>
<body>

    <h1>Dancing Bunny Proxy</h1>
    <button class="btn" onclick="start()">Launch Stealth Tab</button>
    <p id="status">Status: Checking Server...</p>

    <script>
        const renderUrl = "https://dancing-bunny-proxy.onrender.com/";

        // Self-check to see if Render is awake
        async function checkServer() {
            try {
                const res = await fetch(renderUrl);
                if (res.ok) document.getElementById('status').innerText = "Status: Server Online";
            } catch (e) {
                document.getElementById('status').innerText = "Status: Server Waking Up... (Wait 30s)";
            }
        }
        setInterval(checkServer, 5000);
        checkServer();

        function start() {
            const url = prompt("Enter Site URL:", "https://www.bing.com");
            if (!url) return;

            const win = window.open("about:blank", "_blank");
            if (win) {
                const proxyUrl = `${renderUrl}?query=${encodeURIComponent(url)}`;
                win.document.write(`
                    <title>Loading...</title>
                    <body style="margin:0;overflow:hidden;background:#000;">
                        <iframe src="${proxyUrl}" style="width:100vw;height:100vh;border:none;"></iframe>
                    </body>
                `);
            }
        }
    </script>
</body>
</html>
